# 京东移动端网页版 - 历史价格
# 使用方法：
# 1. 将本 conf 添加到 Quantumult X → 重写 → 引用
# 2. 将 https://raw.githubusercontent.com/xdpq/qx/main/js/jd_price.js 放到 Quantumult X 的 Scripts 目录
#    （或把下方脚本路径改成你的本地/远程路径）
# 3. 确保「重写」和「MitM」已开启，证书已安装并信任
# 4. 用 Safari / 内置浏览器打开京东商品页即可看到历史价格浮层

hostname = item.m.jd.com, item.jd.com, wqitem.jd.com

# 移动端商品详情页
^https?://item\.m\.jd\.com/product/\d+\.html url script-response-body https://raw.githubusercontent.com/xdpq/qx/main/js/jd_price.js
^https?://item\.m\.jd\.com/ware/view\.action\?.*wareId=\d+ url script-response-body https://raw.githubusercontent.com/xdpq/qx/main/js/jd_price.js

# 通用 item.jd.com（部分环境会跳到这个域名）
^https?://item\.jd\.com/\d+\.html url script-response-body https://raw.githubusercontent.com/xdpq/qx/main/js/jd_price.js

# 微信 / 手Q 内嵌商品页
^https?://wqitem\.jd\.com/item/view\?.*sku=\d+ url script-response-body https://raw.githubusercontent.com/xdpq/qx/main/js/jd_price.js
