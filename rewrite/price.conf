# 京东移动端网页版 · 历史价格面板
# Quantumult X 配置片段（复制到对应分区，或 [include] 本文件）
#
# 使用前：
# 1. 把 https://raw.githubusercontent.com/xdpq/qx/main/js/jd_price.js 放到 Quantumult X 的 Scripts 目录
#    （iCloud: Quantumult X/Scripts/  或  本机 On My iPhone/Quantumult X/Scripts/）
# 2. 在本 conf 中按需改 script-path
# 3. 开启 HTTPS 解密（MITM），安装并信任证书
# 4. 用 Safari / 京东内置浏览器打开：https://item.m.jd.com/product/{sku}.html

[rewrite_local]
# 京东移动端商品详情页 HTML 注入历史价格面板
^https?:\/\/item\.m\.jd\.com\/product\/\d+\.html url script-response-body https://raw.githubusercontent.com/xdpq/qx/main/js/jd_price.js
^https?:\/\/item\.m\.jd\.com\/ware\/view\.action\?.*wareId=\d+ url script-response-body https://raw.githubusercontent.com/xdpq/qx/main/js/jd_price.js

# 若使用完整路径，可改成：
# ^https?:\/\/item\.m\.jd\.com\/product\/\d+\.html url script-response-body https://raw.githubusercontent.com/YOUR_USER/YOUR_REPO/main/https://raw.githubusercontent.com/xdpq/qx/main/js/jd_price.js

[mitm]
# 只需解密京东商品页；历史价 API 由脚本内 $task.fetch 发起，一般不必 MitM
hostname = item.m.jd.com
